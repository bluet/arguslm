name: Docker Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. v0.3.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: bluet/arguslm
            context: .
            dockerfile: Dockerfile
          - image: bluet/arguslm-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version tag
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          # Use workflow_dispatch input if provided, otherwise the pushed tag.
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          # Strip leading 'v' (v0.3.0 -> 0.3.0) so Docker tags follow convention.
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
